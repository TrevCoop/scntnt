// SHUFFLE FUNCTION //
function shuffleArray(array){
for (let i = array.length - 1; i > 0; i--){
const j = Math.floor(Math.random() * (i + 1));
[array[i], array[j]] = [array[j], array[i]];
}
}

// END SHUFFLE FUNCTION //

// SLIDER LOGIC //

const slider = document.getElementById("questionSlider");
const sliderValue = document.getElementById("sliderValue");
const updateButton = document.getElementById("updateButton");

slider.value = 10;
sliderValue.textContent = 10;


slider.max = quiz.length;

sliderValue.textContent = slider.value;

slider.oninput = function(){

sliderValue.textContent = this.value;

if(this.value != 10){
updateButton.classList.add("update-active");
}
else{
updateButton.classList.remove("update-active");
}

};

// END SLIDER LOGIC //

function startQuiz(){

totalQuestions = parseInt(slider.value);

shuffleArray(quiz);

quiz.length = totalQuestions;

document.getElementById("quizSetup").style.display = "none";

loadQuestion();

}

function loadQuestion(){

document.getElementById("progress").textContent =
"Question " + (current+1) + " of " + totalQuestions;

document.getElementById("questionText").textContent =
quiz[current].question;

document.getElementById("questionImage").src =
quiz[current].image;

}

function answer(choice){

if(choice === quiz[current].answer){
score++;
}
else{

wrongAnswers.push({
question: quiz[current].question,
correct: quiz[current].answer
});

}

current++;

if(current < totalQuestions){
loadQuestion();
}
else{
showResult();
}

}

function showResult(){

document.getElementById("progress").textContent = "Quiz Complete";

document.getElementById("questionText").style.display="none";
document.getElementById("questionImage").style.display="none";
document.getElementById("buttons").style.display="none";

document.getElementById("result").textContent =
"Score: " + score + " / " + totalQuestions;

const reviewDiv = document.getElementById("review");

if(wrongAnswers.length === 0){

reviewDiv.innerHTML = "<p>You got every question correct!</p>";

}
else{

let html = "<h3>Questions You Missed</h3>";

wrongAnswers.forEach(item => {

let correctText = item.correct ? "Asterid" : "Rosid";

html += `
<div class="review-item">
<div><strong>Question:</strong> ${item.question}</div>
<div class="correct-answer">Correct Answer: ${correctText}</div>
</div>
`;

});

reviewDiv.innerHTML = html;

}

}

shuffleArray(quiz);
loadQuestion();

</script>

</body>
</html>
